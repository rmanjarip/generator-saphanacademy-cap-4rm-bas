_schema-version: 3.3.0
ID: generator-saphanacademy-cap
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: generator-saphanacademy-cap-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: generator-saphanacademy-cap-auth
      - name: generator-saphanacademy-cap-db
      - name: generator-saphanacademy-cap-connectivity
      - name: generator-saphanacademy-cap-destination
      - name: generator-saphanacademy-cap-logging
      - name: generator-saphanacademy-cap-auditlog

  - name: generator-saphanacademy-cap-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: generator-saphanacademy-cap-db
  - name: generator-saphanacademy-cap
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: generator-saphanacademy-cap-auth
      - name: generator-saphanacademy-cap-destination
      - name: generator-saphanacademy-cap-html5-runtime
      - name: generator-saphanacademy-cap-portal
      - name: generator-saphanacademy-cap-logging
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: generator-saphanacademy-cap-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: generatorsaphanacademycapadminauthors
          artifacts:
            - admin-authors.zip
          target-path: app/
        - name: generatorsaphanacademycapadminbooks
          artifacts:
            - admin-books.zip
          target-path: app/
        - name: generatorsaphanacademycapbrowse
          artifacts:
            - browse.zip
          target-path: app/
        - name: generatorsaphanacademycapgenres
          artifacts:
            - genres.zip
          target-path: app/
    requires:
      - name: generator-saphanacademy-cap-auth
      - name: srv-api
      - name: generator-saphanacademy-cap-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true

  - name: generatorsaphanacademycapadminauthors
    type: html5
    path: app/admin-authors
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: generatorsaphanacademycapadminbooks
    type: html5
    path: app/admin-books
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: generatorsaphanacademycapbrowse
    type: html5
    path: app/browse
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: generatorsaphanacademycapgenres
    type: html5
    path: app/genres
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: generator-saphanacademy-cap-portal-deployer
    type: com.sap.application.content
    path: app/portal
    requires:
      - name: generator-saphanacademy-cap-portal
        parameters:
          content-target: true
          service-key:
            name: generator-saphanacademy-cap-portal-key
            config:
              content-endpoint: developer
      - name: generator-saphanacademy-cap-auth
      - name: generator-saphanacademy-cap-html5-repo-host
      - name: generator-saphanacademy-cap-app-deployer
    deployed-after:
      - generator-saphanacademy-cap-app-deployer
  - name: notification-content-deployment
    type: nodejs
    path: gen/srv
    parameters:
      no-route: true
      no-start: true
      memory: 256MB
      disk-quota: 1GB
      tasks:
        - name: notification-content-deployment
          command: "node node_modules/@cap-js/notifications/lib/content-deployment.js"
          memory: 256MB
          disk-quota: 1GB
    requires:
      - name: generator-saphanacademy-cap-destination

resources:
  - name: generator-saphanacademy-cap-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: generator-saphanacademy-cap-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'admin (generator-saphanacademy-cap ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.admin'
    requires:
      - name: app-api
  - name: generator-saphanacademy-cap-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: generator-saphanacademy-cap-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
  - name: generator-saphanacademy-cap-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: generator-saphanacademy-cap-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: generator-saphanacademy-cap-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
  - name: generator-saphanacademy-cap-portal
    type: org.cloudfoundry.managed-service
    parameters:
      service: portal
      service-plan: standard
  - name: generator-saphanacademy-cap-logging
    type: org.cloudfoundry.managed-service
    parameters:
      service: application-logs
      service-plan: standard
  - name: generator-saphanacademy-cap-auditlog
    type: org.cloudfoundry.managed-service
    parameters:
      service: auditlog
      service-plan: premium
